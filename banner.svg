<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#FF2D2D"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="300" fill="#0D0D0D"/>

  <rect x="0" y="260" width="1280" height="3" fill="url(#redGradient)"/>

  <text x="80" y="140"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="48"
        fill="#FFFFFF"
        filter="url(#glow)">
    Jesús Soriano
  </text>

  <text x="80" y="190"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="20"
        fill="#CCCCCC">
    Software Engineer · Systems &amp; Interactive Solutions
  </text>

  <circle cx="1150" cy="80" r="40" fill="url(#redGradient)" opacity="0.15"/>
</svg>
