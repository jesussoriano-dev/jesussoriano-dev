<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#FF2D2D"/>
    </linearGradient>

    <linearGradient id="animatedLine" x1="-100%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="40%" stop-color="#FF2D2D"/>
      <stop offset="60%" stop-color="#FF5555"/>
      <stop offset="100%" stop-color="#8B0000"/>
      <animate attributeName="x1" values="-100%; 100%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="200%; 400%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .name {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 58px;
      fill: #FFFFFF;
      filter: url(#glow);
      letter-spacing: 1px;
    }
    .subtitle {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500;
      font-size: 24px;
      fill: #CCCCCC;
      letter-spacing: 0.5px;
    }
    .line-animated {
      animation: subtlePulse 4s ease-in-out infinite;
    }
    @keyframes subtlePulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
  </style>

  <rect width="1280" height="300" fill="#0D0D0D"/>

  <rect x="0" y="260" width="1280" height="3" fill="url(#animatedLine)" class="line-animated"/>

  <text x="80" y="135" class="name">
    Jesús Soriano
  </text>

  <text x="80" y="185" class="subtitle">
    Software Engineer · Systems &amp; Interactive Solutions
  </text>

  <circle cx="1150" cy="80" r="45" fill="url(#redGradient)" opacity="0.12">
    <animate attributeName="r" values="45; 48; 45" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12; 0.18; 0.12" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
